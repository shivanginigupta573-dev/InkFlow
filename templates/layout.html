{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InkFlow{% endblock %}</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#FDFCFB] text-slate-900 antialiased">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-10">
                <a href="/" class="text-2xl font-bold tracking-tighter text-slate-900">InkFlow</a>
                
                <div class="hidden md:flex space-x-6 text-sm font-semibold text-gray-500">
                    <a href="/" class="hover:text-blue-600 transition">Home</a>
                    <a href="#" class="hover:text-blue-600 transition">Write</a>
                    <a href="#" class="hover:text-blue-600 transition">Explore</a>
                </div>

                <div class="relative hidden lg:block">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                    <input type="text" class="bg-gray-100 border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500 w-48 transition-all focus:w-64" placeholder="Search">
                </div>
            </div>

            <div class="flex items-center space-x-5 text-sm font-semibold">
                <a href="#" class="text-gray-600 hover:text-slate-900">Log In</a>
                <a href="#" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-blue-100 hover:bg-blue-700 transition">Sign Up</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 py-10 border-t border-gray-100 text-center text-gray-400 text-sm">
        &copy; 2025 InkWell. All rights reserved.
    </footer>

</body>
</html>
